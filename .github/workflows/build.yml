name: Build
on:
  push:
    branches: [master]
    paths-ignore: [README.md]
  release:
    types: [published]
defaults:
  run:
    shell: bash
    working-directory: src
env:
  CACHE_EPOCH: 1
  CCACHE_MAXSIZE: 200M
  CCACHE_MAXFILES: 0
  SCCACHE_CACHE_SIZE: 200M
jobs:
  cache-toolchains-mac:
    runs-on: macos-13
    steps:
      - uses: actions/checkout@v4
      - uses: actions/cache@v4
        with:
          path: |
            src/third_party/llvm-build/Release+Asserts/
            src/chrome/build/pgo_profiles/chrome-mac-*
            src/gn/
          key: toolchains-pgo-mac-${{ hashFiles('CHROMIUM_VERSION') }}-v${{ env.CACHE_EPOCH }}
      - run: EXTRA_FLAGS='target_cpu="x64"' ./get-clang.sh
      - run: EXTRA_FLAGS='target_cpu="arm64"' ./get-clang.sh
  ios-static-lib:
    needs: cache-toolchains-mac
    runs-on: macos-13
    strategy:
      fail-fast: false
      matrix:
        arch: [arm64, x64]
    env:
      EXTRA_FLAGS: 'target_cpu="${{ matrix.arch }}" target_os="ios" ios_enable_code_signing=false is_component_build=false'
      BUNDLE: libnaiveproxy-${{ github.event.release.tag_name }}-ios-${{ matrix.arch }}.a
    steps:
      - uses: actions/checkout@v4
      - name: Cache toolchains and PGO
        uses: actions/cache@v4
        with:
          path: |
            src/third_party/llvm-build/Release+Asserts/
            src/chrome/build/pgo_profiles/chrome-mac-*
            src/gn/
          key: toolchains-pgo-mac-${{ hashFiles('CHROMIUM_VERSION') }}-v${{ env.CACHE_EPOCH }}
      - run: brew install ninja ccache
      - run: pip install setuptools
      - run: ./get-clang.sh
      - name: Modify build configuration
        run: |
          sed -i '' 's/executable("naive")/static_library("naiveproxy")/' BUILD.gn
          echo 'Building static library...'
          cat BUILD.gn
      - run: ./build.sh
      - name: Package static library
        run: |
          mkdir -p output
          cd out/Release/obj
          
          # Option 1: If libnaiveproxy.a exists, use it directly
          if [ -f libnaiveproxy.a ]; then
            cp libnaiveproxy.a ../../../output/${{ env.BUNDLE }}
          else
            # Option 2: Combine relevant .a files into one
            echo "libnaiveproxy.a not found. Combining relevant libraries..."
            ar -rcT libnaiveproxy_combined.a \
              net/libnet.a \
              net/libnet_nqe_proto.a \
              net/liburi_template.a \
              net/third_party/quiche/libnet_quic_proto.a \
              net/third_party/quiche/libquiche.a \
              url/liburl.a \
              base/libbase.a
            
            cp libnaiveproxy_combined.a ../../../output/${{ env.BUNDLE }}
          fi
          
          cd ../../../
          
          if [ ! -f output/${{ env.BUNDLE }} ]; then
            echo "Error: Failed to create the combined static library"
            exit 1
          fi
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ env.BUNDLE }}
          path: src/output/${{ env.BUNDLE }}
      - name: Upload static library
        if: ${{ github.event_name == 'release' }}
        run: gh release upload "${GITHUB_REF##*/}" output/${{ env.BUNDLE }} --clobber
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
